# CI — lint + build sur chaque push vers main et chaque pull request.
# Échoue si le lint ou le build échoue (filet de sécurité avant merge).
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs obsolètes quand un nouveau push arrive sur la même branche.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build:
    runs-on: ubuntu-latest

    # Variables d'env factices : `next build` évalue les routes serveur,
    # ces valeurs permettent de compiler sans vraie config (cf. .env.example).
    env:
      AUTH_SECRET: ci-fake-secret-not-used-in-production
      ADMIN_EMAIL: ci@example.local
      ADMIN_PASSWORD_HASH: $2a$10$abcdefghijklmnopqrstuvwxyz012345678901234567890123456
      ANTHROPIC_API_KEY: sk-ant-ci-fake-key
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 22 + cache npm
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
